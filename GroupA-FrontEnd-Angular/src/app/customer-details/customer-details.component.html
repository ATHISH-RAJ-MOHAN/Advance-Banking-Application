<div class="card" style="background-color: rgb(204, 231, 255)">
  <div
    class="card-header bg-primary"
    style="background-color: yellow; display: flex; align-items: center"
  >
    <button class="btn btn-primary me-2" (click)="goBack()">Back</button>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <h3 class="mb-0">Customer Details</h3>
  </div>

  <br />
  <div class="card-body px-5">
    <form #customerDetailsForm="ngForm" style="margin-left: 100px">
      <div class="row">
        <div class="form-group col-md-3">
          <label for="name">FirstName:</label>
          <input
            type="text"
            [(ngModel)]="CustomerDetails.firstName"
            name="firstName"
            class="form-control"
            [ngModelOptions]="{ standalone: true }"
          />
        </div>
        <div class="form-group col-md-3">
          <label for="name">LastName:</label>
          <input
            type="text"
            [(ngModel)]="CustomerDetails.lastName"
            name="lastName"
            class="form-control"
            [ngModelOptions]="{ standalone: true }"
          />
        </div>
      </div>

      <div class="row">
        <div class="form-group col-md-3">
          <label for="name">AddressLine1:</label>
          <input
            type="text"
            [(ngModel)]="CustomerDetails.addressLine1"
            name="addressLine1"
            class="form-control"
            [ngModelOptions]="{ standalone: true }"
          />
        </div>
        <div class="form-group col-md-3">
          <label for="name">AddressLine2:</label>
          <input
            type="text"
            [(ngModel)]="CustomerDetails.addressLine2"
            name="addressLine2"
            class="form-control"
            [ngModelOptions]="{ standalone: true }"
          />
        </div>
        <div class="form-group col-md-3">
          <label for="name">AddressLine3:</label>
          <input
            type="text"
            [(ngModel)]="CustomerDetails.addressLine3"
            name="addressLine3"
            class="form-control"
            [ngModelOptions]="{ standalone: true }"
          />
        </div>
      </div>
      <div class="row">
        <div class="form-group col-md-3">
          <label for="name">Pincode:</label>
          <input
            type="text"
            [(ngModel)]="CustomerDetails.pincode"
            name="pincode"
            class="form-control"
            [ngModelOptions]="{ standalone: true }"
          />
        </div>
        <div class="form-group col-md-3">
          <label for="name">City:</label>
          <input
            type="text"
            [(ngModel)]="CustomerDetails.city"
            name="city"
            class="form-control"
            [ngModelOptions]="{ standalone: true }"
          />
        </div>
        <div class="form-group col-md-3">
          <label for="name">Country:</label>
          <input
            type="text"
            [(ngModel)]="CustomerDetails.country"
            name="country"
            class="form-control"
            [ngModelOptions]="{ standalone: true }"
          />
        </div>
      </div>
      <div class="row">
        <div class="form-group col-md-3">
          <label for="phone">PhoneNumber:</label>
          <input
            type="text"
            [(ngModel)]="CustomerDetails.phoneNumber"
            name="phoneNumber"
            class="form-control"
            [ngModelOptions]="{ standalone: true }"
          />
        </div>
        <div class="form-group col-md-3">
          <label for="email">EmailAddress:</label>
          <input
            type="email"
            [(ngModel)]="CustomerDetails.emailAddress"
            name="emailAddress"
            class="form-control"
            [ngModelOptions]="{ standalone: true }"
          />
        </div>
      </div>

      <div class="d-flex justify-content-center" style="margin-top: 1em">
        <button type="submit" class="btn btn-primary" (click)="onEdit()">
          EDIT
        </button>
        &nbsp;
        <button class="btn btn-primary me-2" (click)="goBack()">Back</button>
      </div>
    </form>
  </div>
</div>
<div class="card" style="background-color: rgb(204, 231, 255)">
  <div class="card-header bg-primary" style="padding-left: 80px">
    <h3>&nbsp;&nbsp;&nbsp;Upload Documents</h3>
  </div>
  <div class="container mt-4">
    <h2>Customer Documents</h2>
    <form (submit)="onUpdateDocument()" (ngSubmit)="$event.preventDefault()">
      <!-- Photo Section -->
      <div class="mb-4">
        <h3>Photo</h3>
        <img
          [src]="photo"
          alt="Customer Photo"
          class="img-thumbnail mb-2"
          style="max-width: 300px"
        />
        <div>
          <label for="photoFile" class="form-label">Update Photo:</label>
          <input
            type="file"
            id="photoFile"
            (change)="onFileChange($event, 'photo')"
            class="form-control"
          />
        </div>
      </div>

      <!-- Aadhar Card Section -->
      <div class="mb-4">
        <h3>Aadhar Card</h3>
        <img
          [src]="aadhar"
          alt="Aadhar Card"
          class="img-thumbnail mb-2"
          style="max-width: 300px"
        />
        <div>
          <label for="aadharFile" class="form-label">Update Aadhar Card:</label>
          <input
            type="file"
            id="aadharFile"
            (change)="onFileChange($event, 'aadhar')"
            class="form-control"
          />
        </div>
      </div>

      <!-- PAN Card Section -->
      <div class="mb-4">
        <h3>PAN Card</h3>
        <img
          [src]="panCard"
          alt="PAN Card"
          class="img-thumbnail mb-2"
          style="max-width: 300px"
        />
        <div>
          <label for="panCardFile" class="form-label">Update PAN Card:</label>
          <input
            type="file"
            id="panCardFile"
            (change)="onFileChange($event, 'panCard')"
            class="form-control"
          />
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        &nbsp;
        <button class="btn btn-primary me-2" (click)="goBack()">Back</button>
      </div>
      <br />
      <br />
    </form>
  </div>
</div>
