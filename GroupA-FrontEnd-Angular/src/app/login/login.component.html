<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card login-box" style="background-color: rgb(204, 231, 255); margin: 20px; padding: 40px;">
        <div class="card-body">
          <div class="text-center login-key">
            <i class="fa fa-key" aria-hidden="true"></i>
          </div>
          <form (submit)="onLogin()">
            <div class="mb-3">
              <label class="form-label">USERNAME</label>
              <input type="text" [(ngModel)]="username" name="inputusername" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">PASSWORD</label>
              <input type="password" [(ngModel)]="password" name="inputpassword" class="form-control">
            </div>
            <div class="row justify-content-center">
              <div class="col-lg-12 mb-3">
                <div class="text-center login-text">
                  <!-- Error Message -->
                </div>
              </div>
            </div>
            <div class="row justify-content-center">
              <div class="col-lg-6">
                <div class="d-grid">
                  <button type="submit" class="btn btn-primary">LOGIN</button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
